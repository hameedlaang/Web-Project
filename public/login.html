<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Hameed Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Hameed<span>Portfolio</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="signup.html">Sign Up</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>Login to Portfolio</h1>
        <form action="/auth/login" method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-block">Sign In</button>
        </form>
        <p style="text-align:center; margin-top:15px;">New here? <a href="signup.html">Create Account</a></p>
    </div>

    <footer>
        <p>&copy; 2026 Hameed Ur Rehman | 23I-0547</p>
    </footer>
</body>
</html>

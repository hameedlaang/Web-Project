<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education | Hameed Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Hameed<span>Portfolio</span></div>
    </nav>

    <div class="container">
        <h2>Step 1: Education & Skills</h2>
        <form action="/submit-education" method="POST">
            <div class="form-group">
                <label>Education Details</label>
                <textarea name="education" placeholder="e.g. BS Computer Science - FAST NUCES" required></textarea>
            </div>
            <div class="form-group">
                <label>Technical Skills</label>
                <input type="text" name="skills" placeholder="e.g. Node.js, MongoDB, CSS" required>
            </div>
            <button type="submit" class="btn-block">Next: Projects →</button>
        </form>
    </div>

    <footer>

    </footer>
</body>
</html>

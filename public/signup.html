<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Hameed Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Hameed<span>Portfolio</span></div>
    </nav>

    <div class="container">
        <h1>Create Account</h1>
        <p>Join the portfolio manager to showcase your work.</p>
        
        <form action="/auth/signup" method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="username" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create a password" required>
            </div>
            <button type="submit" class="btn-block">Register Now</button>
        </form>
        
        <p style="margin-top: 15px;">Already have an account? <a href="login.html">Login here</a></p>
    </div>

    <footer>
        <p>&copy; 2026 Hameed Ur Rehman | 23I-0547</p>
    </footer>
</body>
</html>
